<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Invitation 🕷️</title>
    <style>
        :root {
            --spidey-red: #e23636;
            --spidey-blue: #407BFF;
            --spidey-dark: #1a1a24;
            --spidey-bg: #f3f7ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--spidey-bg);
            color: var(--spidey-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(rgba(64, 123, 255, 0.15) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        .card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08), 0 2px 5px rgba(0, 0, 0, 0.03);
            border: 4px solid var(--spidey-red);
            max-width: 620px; /* Made the screen container bigger */
            width: 100%;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--spidey-red);
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }

        .question {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #4a4a5a;
            margin-bottom: 35px;
            font-weight: 500;
        }

        .movie-title {
            color: var(--spidey-blue);
            font-weight: 700;
        }

        .image-display {
            width: 100%;
            height: 280px; /* Taller image presentation box */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            border-radius: 20px;
            overflow: hidden;
            background: #f8f9fa;
        }

        .image-display img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        .action-area {
            position: relative;
            height: 150px; /* Taller movement area for the button trick */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .btn {
            padding: 16px 36px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        #yesBtn {
            background-color: var(--spidey-red);
            color: white;
            z-index: 10;
        }

        #yesBtn:hover {
            background-color: #d12f2f;
            box-shadow: 0 6px 20px rgba(226, 54, 54, 0.3);
        }

        #noBtn {
            background-color: #eaeaea;
            color: #555565;
            position: static;
        }

        .hidden {
            display: none !important;
        }

        /* Clean Modern Grid for Success Screen Images */
        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 25px;
        }

        .grid-gallery img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="card" id="inviteCard">
        <h1>Hey! 🕷️❤️</h1>
        <p class="question">I was wondering... would you want to go out and watch <span class="movie-title">Spider-Man: Brand New Day</span> with me?</p>
        
        <div class="image-display">
            <img id="mainGif" src="https://images.unsplash.com/photo-1635805737707-575885ab0820?auto=format&fit=crop&w=600&q=80" alt="Spider-Man Costume Close Up">
        </div>

        <div class="action-area">
            <button class="btn" id="yesBtn">Sure! 🕸️</button>
            <button class="btn" id="noBtn">No</button>
        </div>
    </div>

    <div class="card hidden" id="successCard">
        <h1>Let's GOOOO! 🕷️✨</h1>
        <p class="question">It's a date! Get ready for Spider-Man. 🍿</p>
        
        <div class="image-display">
            <img src="https://images.unsplash.com/photo-1608889174637-3c44f6326f20?auto=format&fit=crop&w=600&q=80" alt="Spider-Man Pop Art">
        </div>

        <div class="grid-gallery">
            <img src="https://images.unsplash.com/photo-1534802046520-4f27db7f3ae5?auto=format&fit=crop&w=400&q=80" alt="Spider-Man City Landscape">
            <img src="https://images.unsplash.com/photo-1620336655055-088d06e36bf0?auto=format&fit=crop&w=400&q=80" alt="Cute Marvel Set">
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const inviteCard = document.getElementById('inviteCard');
        const successCard = document.getElementById('successCard');
        const mainGif = document.getElementById('mainGif');

        let yesScale = 1;
        let noClicks = 0;

        // Alternate emotional/cute pictures if they click no
        const sadSpideyPics = [
            "https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=600&q=80", // Rainy mood
            "https://images.unsplash.com/photo-1559564484-e48b3e040ff4?auto=format&fit=crop&w=600&q=80", // Thoughtful silhouette
            "https://images.unsplash.com/photo-1618336753974-aae8e04506aa?auto=format&fit=crop&w=600&q=80"  // Pleading Red art style
        ];

        function escapeNoButton(e) {
            e.preventDefault(); // Prevents actual click behavior from refreshing or focusing
            
            const actionArea = document.querySelector('.action-area');
            
            // Switch to absolute positioning so it jumps around inside the action area box
            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
            }

            const padding = 15;
            const maxX = actionArea.clientWidth - noBtn.clientWidth - padding;
            const maxY = actionArea.clientHeight - noBtn.clientHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            // Scale up the Sure button dynamically
            yesScale += 0.35;
            yesBtn.style.transform = `scale(${yesScale})`;

            // Shift through alternate images
            if (noClicks < sadSpideyPics.length) {
                mainGif.src = sadSpideyPics[noClicks];
            }
            noClicks++;
        }

        // Changed strictly to 'click' to handle touch screens and mouse clicks manually
        noBtn.addEventListener('click', escapeNoButton);

        // Date Confirmation
        yesBtn.addEventListener('click', () => {
            inviteCard.classList.add('hidden');
            successCard.classList.remove('hidden');
        });
    </script>
</body>
</html>
